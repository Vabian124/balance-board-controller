name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore BalanceBoard.sln

      - name: Build
        run: dotnet build BalanceBoard.sln -c Release --no-restore -warnaserror

      - name: Unit tests (portable core)
        run: dotnet test tests/BalanceBoard.Core.Tests/BalanceBoard.Core.Tests.csproj -c Release --no-build

      - name: Integration tests (connect flows)
        run: dotnet test tests/BalanceBoard.Integration.Tests/BalanceBoard.Integration.Tests.csproj -c Release --no-build

      - name: Fuzz tests
        run: dotnet test tests/BalanceBoard.Fuzz.Tests/BalanceBoard.Fuzz.Tests.csproj -c Release --no-build

      - name: Automation (simulate board)
        run: dotnet test tests/BalanceBoard.Automation/BalanceBoard.Automation.csproj -c Release --no-build

      - name: Format check
        run: dotnet format BalanceBoard.sln --verify-no-changes

      - name: Validate tool
        run: dotnet run --project tools/Validate/BalanceBoard.Validate.csproj -c Release --no-build

      - name: UI smoke (XAML runtime load)
        run: dotnet run --project tools/UiSmoke/BalanceBoard.UiSmoke.csproj -c Release --no-build
