name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v1.4.0). Re-runs packaging only."
        required: true
        type: string
      skip_ci_check:
        description: "Skip verifying green CI on the tagged commit"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: Package and publish release
    runs-on: windows-latest
    steps:
      - name: Resolve release ref
        id: ref
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}".Trim()
            if ($tag -notmatch '^v') { $tag = "v$tag" }
            "ref=$tag" >> $env:GITHUB_OUTPUT
          } else {
            "ref=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          }

      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Verify version consistency
        if: hashFiles('scripts/ci/verify-version.ps1') != ''
        shell: pwsh
        run: ./scripts/ci/verify-version.ps1 -Tag ${{ steps.ref.outputs.ref }}

      - name: Verify CI passed on tagged commit
        if: github.event_name != 'workflow_dispatch' || inputs.skip_ci_check != true
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;
            const { data: workflows } = await github.rest.actions.listRepoWorkflows({ owner, repo });
            const ci = workflows.workflows.find(w => w.path === '.github/workflows/ci.yml');
            if (!ci) {
              core.setFailed('CI workflow not found.');
              return;
            }
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: ci.id,
              head_sha: sha,
              status: 'completed',
              per_page: 10,
            });
            const success = data.workflow_runs.some(r => r.conclusion === 'success');
            if (!success) {
              core.setFailed(
                `No successful CI run on ${sha}. Push to main, wait for green CI, then tag or use workflow_dispatch with skip_ci_check.`
              );
            }

      - name: Package release
        shell: pwsh
        run: ./scripts/ci/publish-release.ps1

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.ref.outputs.ref }}
          files: |
            dist/*.zip
            dist/*.zip.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
