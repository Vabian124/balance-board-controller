name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Quality gate (format, analyzers, tests, smoke)
        shell: pwsh
        run: ./scripts/ci/lint.ps1

      - name: Upload test artifacts
        if: always() && hashFiles('artifacts/test/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: artifacts/test/
          if-no-files-found: warn
